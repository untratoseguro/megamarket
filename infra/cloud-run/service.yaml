# Cloud Run Service — declaracion de referencia
# Aplicar manualmente con:
#   gcloud run services replace infra/cloud-run/service.yaml --region=us-central1
#
# O usar el workflow de GitHub Actions (api.yml) para deploys automaticos.
# Sustituir los valores REPLACE_ME antes de aplicar manualmente.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: megamarket-api
  labels:
    app: megamarket
    component: api
  annotations:
    run.googleapis.com/ingress: all

spec:
  template:
    metadata:
      annotations:
        # Scale-to-zero: min=0 para no incurrir costos en reposo
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        # CPU boost durante arranque en frio (reduce latencia de cold start)
        run.googleapis.com/startup-cpu-boost: "true"
        # Ejecutar como usuario sin privilegios
        run.googleapis.com/execution-environment: gen2

    spec:
      containerConcurrency: 80
      timeoutSeconds: 60
      serviceAccountName: REPLACE_ME@REPLACE_PROJECT.iam.gserviceaccount.com

      containers:
        - image: REPLACE_REGION-docker.pkg.dev/REPLACE_PROJECT/megamarket/api:latest

          ports:
            - containerPort: 8080

          resources:
            limits:
              memory: 512Mi
              cpu: "1"

          # ── Variables de entorno sin secret ──────────────────────────────
          env:
            - name: ENVIRONMENT
              value: production
            - name: DEBUG
              value: "false"
            - name: CORS_ORIGINS
              value: "https://megamarket.vercel.app"
            - name: FRONTEND_URL
              value: "https://megamarket.vercel.app"
            - name: SUPABASE_URL
              value: "https://cjymqadfiubmijrbvvym.supabase.co"
            - name: PAYPAL_BASE_URL
              value: "https://api-m.paypal.com"
            - name: WOMPI_BASE_URL
              value: "https://production.wompi.co/v1"
            - name: WOMPI_COP_PER_USD
              value: "4100"
            - name: ANTHROPIC_MODEL
              value: "claude-sonnet-4-6"

            # ── Secretos desde Secret Manager ─────────────────────────────
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-service-role-key
                  key: latest
            - name: SUPABASE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supabase-jwt-secret
                  key: latest
            - name: PAYPAL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: paypal-client-id
                  key: latest
            - name: PAYPAL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: paypal-client-secret
                  key: latest
            - name: PAYPAL_WEBHOOK_ID
              valueFrom:
                secretKeyRef:
                  name: paypal-webhook-id
                  key: latest
            - name: WOMPI_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: wompi-private-key
                  key: latest
            - name: WOMPI_EVENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: wompi-event-secret
                  key: latest
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-api-key
                  key: latest

          # ── Health probes ─────────────────────────────────────────────────
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5

  traffic:
    - percent: 100
      latestRevision: true
